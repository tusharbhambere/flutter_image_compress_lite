name: flutter_image_compress_common
description: Lite fork of flutter_image_compress_common — no WebP/SDWebImage/Mantle deps.
repository: https://github.com/qeepcologne/flutter_image_compress_lite
version: 1.0.7

environment:
  sdk: '>=2.12.0 <4.0.0'
  flutter: '>=2.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_image_compress_platform_interface: ^1.0.5

flutter:
  plugin:
    implements: flutter_image_compress
    platforms:
      android:
        package: com.fluttercandies.flutter_image_compress
        pluginClass: ImageCompressPlugin
        dartPluginClass: FlutterImageCompressCommon
      ios:
        pluginClass: ImageCompressPlugin
        dartPluginClass: FlutterImageCompressCommon
